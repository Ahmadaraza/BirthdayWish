<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Jamima 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Quicksand',sans-serif;
margin:0;
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#a18cd1,#ffdde1);
background-size:400% 400%;
animation:bg 12s infinite;
overflow-x:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

.hidden{display:none;}

h1{
font-family:'Pacifico',cursive;
font-size:3rem;
}

button{
padding:14px 35px;
border:none;
border-radius:40px;
font-size:18px;
cursor:pointer;
background:white;
color:#ff7aa2;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
margin-top:20px;
}

.card{
width:300px;
height:350px;
background:white;
color:#444;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
cursor:pointer;
margin-top:30px;
}

.balloon{
position:absolute;
bottom:-100px;
width:40px;
height:60px;
background:pink;
border-radius:50%;
animation:balloon 10s linear infinite;
}

@keyframes balloon{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

.gallery{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
margin-top:25px;
}

.photo{
width:160px;
height:160px;
border-radius:15px;
object-fit:cover;
box-shadow:0 8px 15px rgba(0,0,0,0.3);
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<canvas id="fire"></canvas>

<section id="page1">
<h1>Happy Birthday in Advance Jamiama 🎂</h1>
<h3>For Jamiama, my pookie ❤️</h3>
<p>From Sheikhu</p>
<button onclick="openPage2()">Open Your Surprise 🎁</button>
</section>

<section id="page2" class="hidden">
<div class="card" onclick="openCard()">
<h2>Surprise 🎉</h2>
<p>Click me</p>
</div>
<p id="message"></p>
<button onclick="openPage3()">Next Surprise ✨</button>
</section>

<section id="page3" class="hidden">

<h1>You are very special Jamima ✨</h1>

<p>
This little website is just for you.  
I hope your birthday is full of happiness, smiles and beautiful moments.
</p>

<div class="gallery">
  <img class="photo" src="pic1.jpg">
  <img class="photo" src="pic2.jpg">
  <img class="photo" src="pic3.jpg">
</div>

<button onclick="celebrate()">Celebrate 🎆</button>

<p style="margin-top:20px;font-size:22px">
Happy Birthday in Advance 🎂  
<br>– From Sheikhu
</p>

</section>

<script>

function openPage2(){
document.getElementById("page1").classList.add("hidden")
document.getElementById("page2").classList.remove("hidden")
createBalloons()
}

function openPage3(){
document.getElementById("page2").classList.add("hidden")
document.getElementById("page3").classList.remove("hidden")
}

function openCard(){
document.getElementById("music").play()

let text="Happy Birthday in Advance Jamiama! 🎂 May your life be full of happiness, smiles and success."

let i=0

let typing=setInterval(function(){
document.getElementById("message").innerHTML+=text.charAt(i)
i++
if(i>text.length){clearInterval(typing)}
},40)

}

function createBalloons(){
setInterval(function(){
let b=document.createElement("div")
b.className="balloon"
b.style.left=Math.random()*100+"vw"
document.body.appendChild(b)
setTimeout(()=>b.remove(),10000)
},800)
}

function celebrate(){

let canvas=document.getElementById("fire")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<200;i++){
particles.push({
x:canvas.width/2,
y:canvas.height/2,
vx:(Math.random()-0.5)*8,
vy:(Math.random()-0.5)*8,
alpha:1
})
}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.1)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{
p.x+=p.vx
p.y+=p.vy
p.alpha-=0.01

ctx.globalAlpha=p.alpha
ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(p.x,p.y,3,0,Math.PI*2)
ctx.fill()
})

requestAnimationFrame(animate)

}

animate()

}

</script>

</body>
</html>
